<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times Tables!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✖️ Times Tables! ✖️</h1>
        <p class="subtitle">Click the button to get a problem!</p>
        <div id="problem-display" class="problem-display">
            <span id="n1" class="number-box">?</span>
            <span class="operator">×</span>
            <span id="n2" class="number-box">?</span>
        </div>
        <button id="get-number-btn" class="big-button">New Problem!</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
